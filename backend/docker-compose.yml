version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: nest_backend
    restart: always
    depends_on:
      - db
    env_file:
      - ../.env
    ports:
      - "3000:3000"

volumes:
  postgres_data: